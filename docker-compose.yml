services:
  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - traefik-public
      - coverletter-internal
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.coverletter.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.coverletter.entrypoints=websecure"
      - "traefik.http.routers.coverletter.tls.certresolver=letsencrypt"
      - "traefik.http.services.coverletter.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik-public"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.prod
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      CORS_ORIGINS: "https://${DOMAIN}"
    networks:
      - coverletter-internal

networks:
  traefik-public:
    external: true
  coverletter-internal:
    driver: bridge
